# Unity NetCode 通用经验（开源 framework 随包，不含项目特定同步设计）。
# 与自家设计强耦合的网络案例放 <项目>/.brain-region/knowledge/（legacy: .design-review/knowledge/），走本地 overlay，
# 不随本仓库公开。这里只列 NetCode 框架级的通用 gotcha，任何 NetCode 项目都可能踩。
- id: NET-PREDICT-TICK
  title: "IInputComponentData 在 prediction job 读的是 command stream 回放值，非组件当前值"
  version: {netcode: ">=1.0,<2.0"}
  triggers: [NetCode, prediction, IInputComponentData, tick, command stream, 预测, 回放, 输入残留]
  category: netcode
  bad_pattern: "在 prediction system/job 里直接读 IInputComponentData 的字段判断当前输入状态——prediction 读的是按 tick 回放的历史值，不是组件当前值，导致状态残留/错帧"
  recommended_pattern: "client 消费当前输入在 GhostInputSystemGroup（render frame）读组件；LateSimulation 的 reset 不进 command stream；prediction 内只用回放值做预测，不据此设持久状态"
  source: "Unity NetCode 文档：prediction 与 command stream"

- id: NET-GHOSTBIT-QUERY
  title: "[GhostEnabledBit] 组件放进 SystemAPI.Query 类型参数会让整个 Query 匹配 0"
  version: {netcode: ">=1.0,<2.0"}
  triggers: [NetCode, GhostEnabledBit, EntityQuery, SystemAPI.Query, 匹配0, IsComponentEnabled, enabled bit]
  category: netcode
  bad_pattern: "把带 [GhostEnabledBit] 的组件作为 SystemAPI.Query<T>() 的类型参数——Query 会匹配 0 个实体（HasComponent 单查正常），系统静默不工作"
  recommended_pattern: "改用 ComponentLookup.HasComponent + IsComponentEnabled 在遍历内逐实体查 enabled bit，不要把 [GhostEnabledBit] 组件放进 Query 类型参数"
  source: "Unity NetCode：ghost enabled bit 与 EntityQuery 交互"
